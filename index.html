<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PABot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <button id="btn-back" class="header-back hidden">&#8592; Back</button>
    <h1 class="header-title" id="header-title">PABot</h1>
    <div class="header-actions" id="header-actions">
      <button class="header-btn" id="btn-tasks">Tasks</button>
      <button class="header-btn" id="btn-journal">Journal</button>
    </div>
  </header>

  <!-- Chat View (default) -->
  <main id="chat-view" class="view active">
    <div id="message-list"></div>
  </main>

  <!-- Task View -->
  <div id="task-view" class="view">
    <div id="task-list"></div>
  </div>

  <!-- Journal View -->
  <div id="journal-view" class="view">
    <div id="journal-list"></div>
  </div>

  <!-- Chat Input Bar (hidden in task/journal views) -->
  <div class="chat-bar" id="chat-bar">
    <input
      type="text"
      id="chat-input"
      class="chat-input"
      placeholder="Message PABot..."
      autocomplete="off"
    />
    <button id="chat-send" class="chat-send-btn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
